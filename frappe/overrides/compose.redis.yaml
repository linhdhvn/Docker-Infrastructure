services:
  configurator:
    environment:
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
    depends_on:
      - redis-cache
      - redis-queue

  redis-cache:
    image: redis:8.6-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:8.6-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

volumes:
  redis-queue-data:
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/var/frappe/redis-queue-data' # The absolute path on your host
  redis-cache-data:
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/var/frappe/redis-cache-data' # The absolute path on your host
